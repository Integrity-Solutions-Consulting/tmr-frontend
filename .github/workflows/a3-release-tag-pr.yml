name: Release Please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Use a Personal Access Token here, NOT the default GITHUB_TOKEN.
          # Tags/releases created with GITHUB_TOKEN do not trigger other
          # workflows (like build-release.yml), due to GitHub's recursive
          # workflow protection.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          release-type: simple
          
      - name: Wait for PR checks and auto-merge Release PR
        if: steps.release.outputs.prs_created == 'true'
        run: |
          pr_number=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.number')
          echo "Habilitando auto-merge en PR #$pr_number"
          gh pr merge "$pr_number" \
            --repo "${{ github.repository }}" \
            --auto \
            --merge \
            --delete-branch=false
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
# How this works:
# 1. Every push to main updates a "Release PR" with a changelog and next
#    version number, computed from Conventional Commit messages
#    (feat: -> minor, fix: -> patch, feat!:/fix!: -> major).
# 2. Nothing is tagged or built yet at this point.
# 3. When you're ready to ship, review and merge the Release PR.
# 4. Merging it makes release-please create the git tag (vX.Y.Z) and the
#    GitHub Release. That tag push is what triggers build-release.yml.