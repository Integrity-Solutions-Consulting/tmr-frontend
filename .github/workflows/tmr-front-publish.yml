name: Build and Publish Docker Image

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,prefix=,format=short
            type=ref,event=tag
            type=semver,pattern=v{{major}}


      - name: Build y push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./.docker/containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_CONFIG=production
            API_URL=${{ secrets.API_URL }}

      - name: Disparar redeploy en Dokploy
        if: success()
        run: |
          if [ -n "${{ secrets.DOKPLOY_WEBHOOK_URL }}" ]; then
            echo "Disparando redeploy en Dokploy..."
            curl -fsS -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}"
          else
            echo "DOKPLOY_WEBHOOK_URL no está configurado; se omite el redeploy."
          fi