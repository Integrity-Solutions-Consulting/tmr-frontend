<div
  *ngIf="visible"
  class="download-menu"
>
  <label class="download-label">
    Contenido
  </label>

  <select
    [(ngModel)]="contenido"
    class="download-select"
  >
    <option value="Proyectos">Proyectos</option>
    <option value="Recursos">Recursos</option>
  </select>

  <button
    type="button"
    class="download-action"
    (click)="descargarPdf.emit(contenido); visible = false"
  >
    Descargar PDF
  </button>

  <button
    type="button"
    class="download-action"
    (click)="descargarExcel.emit(contenido); visible = false"
  >
    Descargar Excel
  </button>
</div>
