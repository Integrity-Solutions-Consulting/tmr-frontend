<div class="navbar">

  <div class="profile-container">

    <button
      type="button"
      (click)="togglePerfil()"
      class="profile-button"
    >
      <span>Hola, Marlene</span>
      <img src="/assets/iconos/notificaciones.png" alt="notificaciones">
    </button>

    <!-- Popup de Perfil -->
    <div
      *ngIf="mostrarPerfil"
      class="profile-popup"
    >

      <div class="profile-popup-header">
        <h3>Marlene Cañizares</h3>
        <p>marlene.cañizares&#64;integritysolutions.com.ec</p>
      </div>

      <button
        type="button"
        (click)="cerrarSesion()"
        class="logout-button"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M9 6H5V18H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M13 16L17 12L13 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M17 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>

        <span>Cerrar Sesión</span>
      </button>

    </div>

  </div>

</div>
