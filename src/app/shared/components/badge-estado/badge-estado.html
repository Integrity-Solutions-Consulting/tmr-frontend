<span class="status-badge">

  <span
    class="status-dot"
    [ngClass]="{
      'progress': estado === 'En progreso' || estado === 'Activo',
      'completed': estado === 'Completado',
      'cancelled': estado === 'Cancelado',
      'waiting': estado === 'En espera',
      'inactive': estado === 'Inactivo'
    }"
  >
  </span>

  {{ estado }}

</span>
