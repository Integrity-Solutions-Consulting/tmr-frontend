<aside class="sidebar">

  <!-- Logo -->
  <div class="sidebar__logo">
    <img src="assets/imagenes/logo-isc.png" alt="Integrity Solutions" class="sidebar__logo-img">
  </div>

  <!-- ══ Dashboard ══ -->
  <a routerLink="/dashboard" routerLinkActive="active" class="sidebar__link" *ngIf="hasModule('Dashboard')">
    <span class="sidebar__svg" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Dashboard/dashboard.svg')"></span>
    <span>Dashboard</span>
  </a>

  <!-- ══ Proyectos ══ -->
  <a routerLink="/proyectos" routerLinkActive="active" class="sidebar__link" *ngIf="hasModule('Proyectos')">
    <span class="sidebar__svg" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Proyectos/proyectos.svg')"></span>
    <span>Proyectos</span>
  </a>

  <!-- ══ Time Report ══ -->
  <div class="sidebar__group" [class.sidebar__group--open]="trOpen" *ngIf="hasModule('Time Report') || hasModule('Actividades') || hasModule('Seguimiento')">
    <a class="sidebar__link sidebar__link--parent" (click)="trOpen = !trOpen">
      <span class="sidebar__svg" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Time-Report/time-report.svg')"></span>
      <span>Time Report</span>
      <span class="sidebar__chevron" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/chevron-sidebar.svg')"></span>
    </a>
    <div class="sidebar__submenu" [class.sidebar__submenu--visible]="trOpen">
      <a routerLink="/time-report/actividades" routerLinkActive="active" class="sidebar__sublink" *ngIf="hasModule('Actividades')">
        <span class="sidebar__svg sidebar__svg--sm" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Time-Report/actividades.svg')"></span>
        <span>Actividades</span>
      </a>
      <a routerLink="/time-report/seguimiento" routerLinkActive="active" class="sidebar__sublink" *ngIf="hasModule('Seguimiento')">
        <span class="sidebar__svg sidebar__svg--sm" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Time-Report/seguimiento.svg')"></span>
        <span>Seguimiento</span>
      </a>
    </div>
  </div>

  <!-- ══ Carga Actividades ══ -->
  <a routerLink="/carga-actividades" routerLinkActive="active" class="sidebar__link" *ngIf="hasModule('Actividades')">
    <span class="sidebar__svg" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/CargaDeActividades/carga-actividades.svg')"></span>
    <span>Carga Actividades</span>
  </a>

  <!-- ══ Reportes ══ -->
  <div class="sidebar__group" [class.sidebar__group--open]="repOpen" *ngIf="hasModule('Reportes')">
    <a class="sidebar__link sidebar__link--parent" (click)="repOpen = !repOpen">
      <span class="sidebar__svg" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Reportes/reportes.svg')"></span>
      <span>Reportes</span>
      <span class="sidebar__chevron" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/chevron-sidebar.svg')"></span>
    </a>
    <div class="sidebar__submenu" [class.sidebar__submenu--visible]="repOpen">
      <a routerLink="/reportes/horas" routerLinkActive="active" class="sidebar__sublink">
        <span class="sidebar__svg sidebar__svg--sm" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Reportes/horas.svg')"></span>
        <span>Por Horas</span>
      </a>
      <a routerLink="/reportes/fechas" routerLinkActive="active" class="sidebar__sublink">
        <span class="sidebar__svg sidebar__svg--sm" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Reportes/fechas.svg')"></span>
        <span>Por Fechas</span>
      </a>
    </div>
  </div>

  <!-- ══ Líderes ══ -->
  <a routerLink="/lideres" routerLinkActive="active" class="sidebar__link" *ngIf="hasModule('Lideres')">
    <span class="sidebar__svg" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Lideres/lideres.svg')"></span>
    <span>Líderes</span>
  </a>

  <!-- ══ Colaboradores ══ -->
  <a routerLink="/colaboradores" routerLinkActive="active" class="sidebar__link" *ngIf="hasModule('Colaboradores')">
    <span class="sidebar__svg" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Colaboradores/colaboradores.svg')"></span>
    <span>Colaboradores</span>
  </a>

  <!-- ══ Clientes ══ -->
  <a routerLink="/clientes" routerLinkActive="active" class="sidebar__link" *ngIf="hasModule('Clientes')">
    <span class="sidebar__svg" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Clientes/clientes.svg')"></span>
    <span>Clientes</span>
  </a>

  <!-- Divider -->
  <div class="sidebar__divider" *ngIf="hasModule('Configuracion')"></div>

  <!-- ══ Configuración ══ -->
  <div class="sidebar__group" [class.sidebar__group--open]="cfgOpen" *ngIf="hasModule('Configuracion')">
    <a class="sidebar__link sidebar__link--parent" (click)="cfgOpen = !cfgOpen">
      <span class="sidebar__svg" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Configuracion/configuracion.svg')"></span>
      <span>Configuración</span>
      <span class="sidebar__chevron" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/chevron-sidebar.svg')"></span>
    </a>
    <div class="sidebar__submenu" [class.sidebar__submenu--visible]="cfgOpen">
      <a routerLink="/configuracion/usuarios" routerLinkActive="active" class="sidebar__sublink">
        <span class="sidebar__svg sidebar__svg--sm" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Configuracion/usuarios.svg')"></span>
        <span>Usuarios</span>
      </a>
      <a routerLink="/configuracion/roles" routerLinkActive="active" class="sidebar__sublink">
        <span class="sidebar__svg sidebar__svg--sm" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Configuracion/roles.svg')"></span>
        <span>Roles</span>
      </a>
      <a routerLink="/configuracion/feriados" routerLinkActive="active" class="sidebar__sublink">
        <span class="sidebar__svg sidebar__svg--sm" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Configuracion/feriados.svg')"></span>
        <span>Feriados</span>
      </a>
    </div>
  </div>

</aside>
