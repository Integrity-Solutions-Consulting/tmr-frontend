<header class="navbar">
  <button class="navbar__hamburger" (click)="toggleSidebar()" aria-label="Menú">
    <span class="material-symbols-outlined">menu</span>
  </button>

  <div class="navbar__spacer"></div>

  <div class="navbar__user">
    <button type="button" class="navbar__profile-trigger" (click)="togglePerfil()">
      <span class="navbar__profile-text">Hola, {{ user.name.split(' ')[0] }}</span>
      <span class="material-symbols-outlined navbar__profile-icon">account_circle</span>
    </button>

    <button type="button" class="navbar__notification" aria-label="Notificaciones">
      <span class="navbar__notification-dot"></span>
    </button>

    <app-profile-popover
      [abierto]="perfilAbierto"
      [nombre]="user.name"
      [correo]="user.email"
      (cerrar)="cerrarPerfil()"
      (cerrarSesion)="cerrarSesion()"
      (cambiarPassword)="abrirCambiarPassword()"
    ></app-profile-popover>
  </div>
</header>
