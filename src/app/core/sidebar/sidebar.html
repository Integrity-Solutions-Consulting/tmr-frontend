<aside class="sidebar">
    <div class="sidebar-logo">
        <img src="assets/logo/logo-isc.ico" alt="Integrity Solutions">
    </div>

    <nav class="sidebar-nav">
        <!-- Dashboard -->
        <a routerLink="/dashboard" routerLinkActive="active" class="sidebar-link">
            <img src="assets/iconos/dashboard.svg" alt="dashboard">
            <span>Dashboard</span>
        </a>

        <!-- Time Report (Menu Colapsable) -->
        <a class="sidebar-link sidebar-link-between" (click)="toggleTimeReport()" routerLinkActive="active-parent">
            <div class="sidebar-link-content">
                <img src="assets/iconos/Time-Report.png" alt="reportes">
                <span>Time Report</span>
            </div>
            <span class="sidebar-arrow" [class.sidebar-arrow-down]="timeReportExpanded">⌃</span>
        </a>

        <!-- Submenu -->
        <div class="sidebar-submenu" *ngIf="timeReportExpanded">
            <a routerLink="/time-report/actividades" routerLinkActive="active" class="sidebar-sublink">
                <img src="assets/iconos/actividades.png" alt="actividades">
                <span>Actividades</span>
            </a>

            <a routerLink="/time-report/carga" routerLinkActive="active" class="sidebar-sublink sidebar-sublink-large">
                <img src="assets/iconos/carga-actividades.png" alt="carga">
                <span>Carga de<br>Actividades</span>
            </a>

            <a routerLink="/time-report/seguimiento" routerLinkActive="active" class="sidebar-sublink">
                <img src="assets/iconos/seguimiento.png" alt="seguimiento">
                <span>Seguimiento</span>
            </a>
        </div>

        <!-- Otros Enlaces -->
        <a routerLink="/proyectos" routerLinkActive="active" class="sidebar-link sidebar-link-margin">
            <img src="assets/iconos/proyectos.png" alt="proyectos">
            <span>Proyectos</span>
        </a>

        <a routerLink="/lideres" routerLinkActive="active" class="sidebar-link">
            <img src="assets/iconos/lideres.png" alt="lideres">
            <span>Líderes</span>
        </a>

        <a routerLink="/colaboradores" routerLinkActive="active" class="sidebar-link">
            <img src="assets/iconos/colaboradores.png" alt="colaboradores">
            <span>Colaboradores</span>
        </a>

        <a routerLink="/clientes" routerLinkActive="active" class="sidebar-link">
            <img src="assets/iconos/clientes.png" alt="clientes">
            <span>Clientes</span>
        </a>
    </nav>
</aside>
