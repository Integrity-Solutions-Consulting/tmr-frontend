<div class="forgot-password-container">
  <img src="assets/imagenes/background.png" alt="Background" class="background" />

  <div class="forgot-password-card">
    <!-- Back Button -->
    <button class="back-button" (click)="goBack()" type="button">
      ← Regresar
    </button>

    <div class="icon-container">
      <img src="assets/iconos/rotate-ccw-key/rotate-sww-key.png" alt="Forgot Password Icon" class="icon" />
    </div>

    <h1 class="title">Recuperar contraseña</h1>

    <p class="subtitle">Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña</p>

    <!-- Success Message -->
    <div class="success-message" *ngIf="successMessage$ | async as message">
      ✓ {{ message }}
    </div>

    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="form">
      <!-- Email Input -->
      <div class="form-group">
        <input
          type="email"
          placeholder="Correo electrónico"
          formControlName="email"
          class="input-field"
          [class.error]="email?.invalid && email?.touched"
        />
        <span class="error-message" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">Email es requerido</span>
          <span *ngIf="email?.errors?.['email']">Email no válido</span>
        </span>
      </div>

      <!-- Error Message -->
      <div class="global-error" *ngIf="error$ | async as error">
        {{ error }}
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="submit-button"
        [disabled]="forgotPasswordForm.invalid || (loading$ | async)"
      >
        <span *ngIf="!(loading$ | async)">Enviar enlace</span>
        <span *ngIf="loading$ | async">Enviando...</span>
      </button>
    </form>
  </div>
</div>
