<div class="report-wrapper">

  <app-header title="Reporte Por Horas" subtitle="Seguimiento mensual de horas laboradas">
  </app-header>

  <div class="report-content">

    <div class="toolbar">
      <app-descargar-menu 
        [disabled]="datosFiltrados().length === 0"
        (descargarPDF)="exportarPDF()" 
        (descargarExcel)="exportarExcel()">
      </app-descargar-menu>
    </div>

    <div class="filters-container">
      <div class="filter-group">
        <label class="filter-label">Buscar Cliente</label>
        <div class="filter-input-wrapper">
          <input type="text" [value]="busquedaCliente()" (input)="onInputSanitized('cliente', $event)"
            placeholder="Ej: Banco Guayaquil..." class="filter-input">
          <svg class="filter-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </svg>
        </div>
      </div>

      <div class="filter-group select-group">
        <label class="filter-label">Mes</label>
        <div class="filter-input-wrapper">
          <select [ngModel]="mesSeleccionado()" (ngModelChange)="onMesChange($event)"
            class="filter-input filter-select">
            <option value="ALL">Todos los meses</option>
            @for (mes of meses; track mes) {
            <option [value]="mes">{{ mes }}</option>
            }
          </select>
          <svg class="filter-icon-right" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2">
            <path d="m6 9 6 6 6-6" />
          </svg>
        </div>
      </div>

      <div class="filter-group select-group">
        <label class="filter-label">Año</label>
        <div class="filter-input-wrapper">
          <select [ngModel]="anioSeleccionado()" (ngModelChange)="onAnioChange($event)"
            class="filter-input filter-select">
            <option value="ALL">Todos los años</option>
            @for (anio of anios; track anio) {
            <option [value]="anio">{{ anio }}</option>
            }
          </select>
          <svg class="filter-icon-right" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2">
            <path d="m6 9 6 6 6-6" />
          </svg>
        </div>
      </div>

      <button (click)="limpiarFiltros()" class="btn-clear" title="Limpiar filtros">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6" />
        </svg>
      </button>
    </div>
    @if (!mostrarDatos()) {
    <div class="empty-state border border-[#E5E5E5] rounded-[12px] bg-white mt-4">
      <div class="empty-content">
        <div class="empty-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
        </div>
        <h3>Consulta de Reporte de Horas</h3>
        <p>Selecciona mes y año para visualizar el resumen de horas.</p>
        <button (click)="verTodo()" class="btn-link">Ver todo el historial</button>
      </div>
    </div>
    } @else {
    <!-- Tarjetas de Métricas -->
    <div class="metricas-grid" *ngIf="datos().length > 0">
      <!-- Tarjeta 1: Clientes Únicos -->
      <div class="metrica-card">
        <div class="metrica-icon clientes">
          <span class="metrica-icon-svg" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Clientes/clientes.svg')"></span>
        </div>
        <div class="metrica-content">
          <div class="metrica-valor">{{ clientesUnicos() }}</div>
          <div class="metrica-label">Clientes Únicos</div>
        </div>
      </div>
 
      <!-- Tarjeta 2: Recursos Asignados -->
      <div class="metrica-card">
        <div class="metrica-icon colaboradores">
          <span class="metrica-icon-svg" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Colaboradores/colaboradores.svg')"></span>
        </div>
        <div class="metrica-content">
          <div class="metrica-valor">{{ totalRecursos() | number: '1.0-0' }}</div>
          <div class="metrica-label">Recursos Asignados</div>
        </div>
      </div>
 
      <!-- Tarjeta 3: Horas Reportadas -->
      <div class="metrica-card">
        <div class="metrica-icon horas">
          <span class="metrica-icon-svg" style="--icon: url('assets/iconos/Iconos-Sidebar&Cards/Time-Report/time-report.svg')"></span>
        </div>
        <div class="metrica-content">
          <div class="metrica-valor">{{ totalHoras() | number: '1.0-0' }} h</div>
          <div class="metrica-label">Horas Reportadas</div>
        </div>
      </div>
    </div>

    <app-tabla [datosPaginados]="datosPaginados()" [columnas]="columnasTabla" [paginaActual]="paginaActual"
      [totalPaginas]="totalPaginas" [total]="datosFiltrados().length" [porPagina]="itemsPorPagina()"
      [mostrarDatos]="mostrarDatos()" (paginaCambia)="paginaActual.set($event)">
    </app-tabla>
    }


  </div>
</div>
