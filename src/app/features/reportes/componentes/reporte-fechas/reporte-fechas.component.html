<div class="report-wrapper">

  <app-header title="Reporte Por Fechas" subtitle="Consulta detallada de asignaciones y periodos de ejecución.">
  </app-header>

  <div class="report-content">

    <div class="toolbar">
      <app-descargar-menu 
        [disabled]="datosFiltrados().length === 0"
        (descargarPDF)="exportarPDF()" 
        (descargarExcel)="exportarExcel()">
      </app-descargar-menu>
    </div>

    @if (mostrarDatos()) {
    <div class="metricas-grid">
      <!-- Asignaciones -->
      <div class="metrica-card">
        <div class="metrica-content">
          <div class="metrica-valor">{{ datosFiltrados().length }}</div>
          <div class="metrica-label">Asignaciones</div>
        </div>
        <div class="metrica-icon asignaciones">
          <mat-icon [style.width.px]="24" [style.height.px]="24">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2">
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
              <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
            </svg>
          </mat-icon>
        </div>
      </div>

      <!-- Líderes -->
      <div class="metrica-card">
        <div class="metrica-content">
          <div class="metrica-valor">{{ lideresUnicos() }}</div>
          <div class="metrica-label">Líderes</div>
        </div>
        <div class="metrica-icon lideres">
          <mat-icon [style.width.px]="24" [style.height.px]="24">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <polygon points="19 11 20 13 22 13 20.5 14 21 16 19 15 17 16 17.5 14 16 13 18 13"></polygon>
            </svg>
          </mat-icon>
        </div>
      </div>

      <!-- Recursos -->
      <div class="metrica-card">
        <div class="metrica-content">
          <div class="metrica-valor">{{ recursosUnicos() }}</div>
          <div class="metrica-label">Recursos</div>
        </div>
        <div class="metrica-icon colaboradores">
          <mat-icon [style.width.px]="24" [style.height.px]="24">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
          </mat-icon>
        </div>
      </div>

      <!-- Clientes -->
      <div class="metrica-card">
        <div class="metrica-content">
          <div class="metrica-valor">{{ clientesUnicos() }}</div>
          <div class="metrica-label">Clientes</div>
        </div>
        <div class="metrica-icon clientes">
          <mat-icon [style.width.px]="24" [style.height.px]="24">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2">
              <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
              <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path>
            </svg>
          </mat-icon>
        </div>
      </div>
    </div>
    }

    <div class="filters-container">
      <div class="filter-group">
        <label class="filter-label">Cliente</label>
        <div class="filter-input-wrapper">
          <input type="text" [value]="busquedaCliente()" (input)="onInputSanitized('cliente', $event)"
            placeholder="Buscar cliente..." class="filter-input">
          <svg class="filter-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </svg>
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">Líder</label>
        <div class="filter-input-wrapper">
          <input type="text" [value]="busquedaLider()" (input)="onInputSanitized('lider', $event)"
            placeholder="Buscar líder..." class="filter-input">
          <svg class="filter-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="7" r="4" />
            <path d="M10 14H6a4 4 0 0 0-4 4v2" />
            <path d="M12 21h10" />
            <path d="m18 15 4 4-4 4" />
          </svg>
        </div>
      </div>

      <div class="filter-group date-group">
        <label class="filter-label">Inicio</label>
        <input type="date" [ngModel]="fechaInicio()" (ngModelChange)="onFiltroChange('fechaInicio', $event)"
          class="filter-input">
      </div>

      <div class="filter-group date-group">
        <label class="filter-label">Fin</label>
        <input type="date" [ngModel]="fechaFin()" (ngModelChange)="onFiltroChange('fechaFin', $event)"
          class="filter-input">
      </div>

      <button (click)="limpiarFiltros()" class="btn-clear" title="Limpiar filtros">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6" />
        </svg>
      </button>
    </div>

    @if (!mostrarDatos()) {
    <div class="empty-state border border-[#E5E5E5] rounded-[12px] bg-white mt-4">
      <div class="empty-content">
        <div class="empty-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </svg>
        </div>
        <h3>Consulta de Reporte por Fechas</h3>
        <p>Filtra por cliente, líder o rango para visualizar resultados.</p>
        <button (click)="verTodo()" class="btn-link">Ver todo el historial</button>
      </div>
    </div>
    } @else {
    <app-tabla [datosPaginados]="datosPaginados()" [columnas]="columnasTabla" [paginaActual]="paginaActual"
      [totalPaginas]="totalPaginas" [total]="datosFiltrados().length" [porPagina]="itemsPorPagina()"
      [mostrarDatos]="mostrarDatos()" (paginaCambia)="paginaActual.set($event)">
    </app-tabla>
    }
  </div>
</div>
