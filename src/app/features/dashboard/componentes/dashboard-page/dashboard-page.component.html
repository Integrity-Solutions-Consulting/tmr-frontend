<div class="dashboard-container">
  <!-- Título -->
  <div class="dashboard-header">
    <h1>Dashboard</h1>
    <div class="header-controls">
      <select class="rango-select" (change)="onRangoChange($event)">
        <option value="mes">Este mes</option>
        <option value="trimestre">Este trimestre</option>
        <option value="anio">Este año</option>
      </select>
    </div>
  </div>

  <!-- Métricas -->
  <div class="section-metricas" *ngIf="metricas$ | async as metricas">
    <app-dashboard-metricas [metricas]="metricas"></app-dashboard-metricas>
  </div>

  <!-- Contenido Principal -->
  <div class="dashboard-content">
    
    <!-- Proximamente a cerrar -->
    <div class="section-proximamente" *ngIf="proximosACerrar$ | async as proximamente">
      <app-proximamente-cerrar [proyectos]="proximamente"></app-proximamente-cerrar>
    </div>

    <!-- Gráfico de Horas -->
    <div class="section-grafico" *ngIf="horasPorProyecto$ | async as horasData">
      <app-grafico-horas 
        [horasData]="horasData"
        [proyectosPorCliente]="(proyectosPorCliente$ | async) || []"
        [totalProyectos]="(metricas$ | async)?.totalProyectos || 0">
      </app-grafico-horas>
    </div>
  </div>
</div>
