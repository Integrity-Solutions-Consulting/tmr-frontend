<div class="colabs-page">
  <div class="colabs-page__wrapper">

    <h1 class="colabs-page__title">Colaboradores</h1>

    <div class="colabs-page__metricas">
      <app-cards-metricas
        [totalColaboradores]="totalColaboradores"
        [noAsignados]="noAsignados"
        [asignados]="asignados"
        [inactivos]="inactivos"
        [activos]="activos"
      />
    </div>

    <div class="colabs-page__toolbar">
      <div class="colabs-page__toolbar-left">
        <app-filtros-colaboradores
          (filtrosCambian)="onFiltrosCambian($event)"
        />
      </div>
      <div class="colabs-page__toolbar-right">
        <app-descargar-menu
          (descargarPDF)="onDescargarPDF()"
          (descargarExcel)="onDescargarExcel()"
        />
        <button class="colabs-page__btn-agregar" (click)="abrirCrear()" type="button">
          Agregar
          <img src="assets/iconos/btn-agregar.svg" alt="agregar" width="16" height="16" />
        </button>
      </div>
    </div>

    <div class="colabs-page__table-container">
      <app-tabla-colaboradores
        [colaboradores]="colaboradores"
        [cargando]="cargando"
        (verDetalle)="abrirDetalle($event)"
        (editar)="abrirEditar($event)"
        (cambiarEstado)="onCambiarEstado($event)"
      />
    </div>

    <app-paginacion
      [paginaActual]="paginaActual"
      [totalPaginas]="totalPaginas"
      [total]="total"
      [porPagina]="porPagina"
      (paginaCambia)="onPaginaCambia($event)"
    />
  </div>
</div>

@if (modalDetalle) {
  <app-modal-detalle-colaborador
    [colaborador]="modalDetalle"
    (cerrar)="cerrarDetalle()"
    (editar)="abrirEditar($event)"
  />
}

@if (modalCrear) {
  <app-modal-crear-colaborador
    (cerrar)="cerrarCrear()"
    (guardar)="onCrear($event)"
  />
}

@if (modalEditar) {
  <app-modal-editar-colaborador
    [colaborador]="modalEditar"
    (cerrar)="cerrarEditar()"
    (guardar)="onEditar($event)"
  />
}

@if (notificacion) {
  <app-notificacion-colaborador
    [notificacion]="notificacion"
    (cerrar)="cerrarNotificacion()"
  />
}
